{% extends "base.html" %}

{% block title %}Medical Chatbot{% endblock %}

{% block content %}
<div class="chatbot-container">
    <h2>Medical Assistant Chatbot</h2>
    <p>Describe your symptoms, and I will recommend the right department for you.</p>

    <div id="chat-window" style="border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 15px; margin-bottom: 15px; background: #f9f9f9;">
        <!-- Chat messages will appear here -->
    </div>

    <form id="chat-form">
        {% csrf_token %}
        <div style="display: flex; gap: 10px;">
            <input type="text" id="user-input" placeholder="Type your symptoms here..." style="flex-grow: 1; padding: 10px;" required>
            <button type="submit" style="padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer;">Send</button>
        </div>
    </form>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');

    // Function to append messages to the chat window
    function appendMessage(sender, text, isAI = false) {
        const msgDiv = document.createElement('div');
        msgDiv.style.marginBottom = '10px';
        msgDiv.style.padding = '8px';
        msgDiv.style.borderRadius = '5px';
        msgDiv.style.backgroundColor = isAI ? '#e9ecef' : '#d1ecf1';
        msgDiv.innerHTML = `<strong>${sender}:</strong> ${text}`;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // Load chat history on page load
    async function loadHistory() {
        try {
            const response = await fetch("{% url 'chatbot:chat_history' %}");
            const data = await response.json();
            data.history.forEach(chat => {
                appendMessage('You', chat.message);
                appendMessage('AI', chat.response, true);
            });
        } catch (error) {
            console.error('Error loading history:', error);
        }
    }

    // Handle form submission
    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const message = userInput.value.trim();
        if (!message) return;

        appendMessage('You', message);
        userInput.value = '';

        try {
            const response = await fetch("{% url 'chatbot:chatbot_send' %}", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                },
                body: JSON.stringify({ message: message })
            });

            const result = await response.json();
            appendMessage('AI', result.message, true);
        } catch (error) {
            appendMessage('AI', 'Sorry, something went wrong. Please try again.', true);
        }
    });

    // Initialize history
    loadHistory();
</script>
{% endblock %}
