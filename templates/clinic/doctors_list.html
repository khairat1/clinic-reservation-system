{% extends "base.html" %}
{% load static %}

{% block content %}

<section class="section">
    <h2>Our Doctors</h2>
    <div class="cards-grid">
        {% for doctor in doctors %}
        <div class="card">
            <img src="/static/images/{{ doctor.image }}" alt="{{ doctor.name }}">
            <h3>{{ doctor.name }}</h3>
            <p>{{ doctor.description|truncatewords:20 }}</p>
<a href="#">Book Appointment</a>
        </div>
        {% endfor %}
    </div>
</section>

{% endblock %}
