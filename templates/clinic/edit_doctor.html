{% extends "base.html" %}

{% block content %}

<section class="section">
    <h2>Edit Doctor — {{ doctor.name }}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Changes</button>
        <a href="{% url 'clinic:admin_dashboard' %}">Cancel</a>
    </form>
</section>

{% endblock %}
